<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defense Base Color</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f14;
    color: #e8e8ec;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  .badge {
    font-size: 12px;
    color: #8a8a92;
    background: rgba(255,255,255,0.06);
    padding: 4px 10px;
    border-radius: 999px;
  }
  model-viewer {
    flex: 1;
    width: 100%;
    --poster-color: transparent;
    background: radial-gradient(circle at 50% 40%, #1c1c24 0%, #0a0a0e 100%);
  }
  .hint {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: #6a6a72;
    pointer-events: none;
  }
</style>
</head>
<body>
  <header>
    <h1>Defense Base Color</h1>
    <span class="badge">3D Viewer</span>
  </header>
  <model-viewer
    src="defense.glb"
    alt="Defense Base Color 3D model"
    auto-rotate
    rotation-per-second="20deg"
    camera-controls
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    autoplay>
  </model-viewer>
  <div class="hint">拖拽旋转 · 滚轮缩放 · 双指平移</div>
</body>
</html>
